<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Distributed Wikipedia Search Engine Architecture</title>
  <desc id="desc">A polished architecture diagram showing corpus ingestion, MapReduce indexing, index storage, and threaded FastAPI query serving.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fafc"/>
      <stop offset="48%" stop-color="#eef7f6"/>
      <stop offset="100%" stop-color="#f8f4ed"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 16px Arial, sans-serif; fill: #475569; }
      .lane-title { font: 700 15px Arial, sans-serif; fill: #334155; letter-spacing: .06em; }
      .box-title { font: 700 19px Arial, sans-serif; fill: #0f172a; }
      .box-copy { font: 400 13px Arial, sans-serif; fill: #475569; }
      .badge { font: 700 12px Arial, sans-serif; fill: #ffffff; }
      .metric { font: 700 18px Arial, sans-serif; fill: #0f172a; }
      .metric-copy { font: 400 12px Arial, sans-serif; fill: #64748b; }
      .line { stroke: #64748b; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .soft-line { stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 7 7; fill: none; marker-end: url(#arrow); }
      .card { fill: #ffffff; stroke: #dbe4ea; stroke-width: 1.5; rx: 18; filter: url(#shadow); }
      .lane { fill: rgba(255,255,255,.48); stroke: #d9e2ea; stroke-width: 1; rx: 24; }
      .icon { fill: #ecfeff; stroke: #14b8a6; stroke-width: 1.5; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>

  <text x="70" y="70" class="title">Distributed Wikipedia Search Engine</text>
  <text x="72" y="100" class="subtitle">BeautifulSoup parsing, local MapReduce indexing, TF-IDF scoring, PageRank authority, and threaded FastAPI query fan-out.</text>

  <rect x="70" y="130" width="1140" height="430" class="lane"/>
  <text x="96" y="166" class="lane-title">INDEXING PIPELINE</text>
  <text x="740" y="166" class="lane-title">QUERY SERVING PATH</text>

  <rect x="94" y="205" width="190" height="118" class="card"/>
  <circle cx="126" cy="238" r="18" class="icon"/>
  <path d="M118 237 h16 M118 244 h16 M118 230 h16" stroke="#0f766e" stroke-width="2" stroke-linecap="round"/>
  <text x="154" y="237" class="box-title">Wikipedia Corpus</text>
  <text x="118" y="270" class="box-copy">HTML, XML, or text pages</text>
  <text x="118" y="292" class="box-copy">Bundled sample plus 25k mode</text>

  <rect x="342" y="205" width="190" height="118" class="card"/>
  <circle cx="374" cy="238" r="18" class="icon"/>
  <path d="M366 239 c5 -11 16 -11 16 0 c0 9 -16 9 -16 0 z" fill="none" stroke="#0f766e" stroke-width="2"/>
  <text x="402" y="237" class="box-title">Parser</text>
  <text x="366" y="270" class="box-copy">BeautifulSoup cleanup</text>
  <text x="366" y="292" class="box-copy">Titles, body text, links</text>

  <rect x="590" y="205" width="210" height="118" class="card"/>
  <circle cx="622" cy="238" r="18" class="icon"/>
  <path d="M614 232 h16 v12 h-16 z M618 228 v4 M626 228 v4" fill="none" stroke="#0f766e" stroke-width="2" stroke-linejoin="round"/>
  <text x="650" y="237" class="box-title">MapReduce Jobs</text>
  <text x="614" y="270" class="box-copy">Tokenize, count, reduce</text>
  <text x="614" y="292" class="box-copy">Build postings and link graph</text>

  <rect x="858" y="205" width="190" height="118" class="card"/>
  <circle cx="890" cy="238" r="18" class="icon"/>
  <path d="M882 245 l6 -14 l5 8 l5 -12 l8 18" fill="none" stroke="#0f766e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="918" y="237" class="box-title">Ranking Signals</text>
  <text x="882" y="270" class="box-copy">TF-IDF relevance</text>
  <text x="882" y="292" class="box-copy">PageRank authority</text>

  <rect x="466" y="390" width="220" height="118" class="card"/>
  <circle cx="498" cy="423" r="18" class="icon"/>
  <path d="M490 416 h16 v18 h-16 z M494 421 h8 M494 426 h8" fill="none" stroke="#0f766e" stroke-width="2" stroke-linecap="round"/>
  <text x="526" y="422" class="box-title">File-backed Index</text>
  <text x="490" y="455" class="box-copy">JSON index artifacts</text>
  <text x="490" y="477" class="box-copy">Documents, shards, graph</text>

  <rect x="746" y="390" width="210" height="118" class="card"/>
  <circle cx="778" cy="423" r="18" class="icon"/>
  <path d="M770 417 h16 M770 423 h16 M770 429 h16" stroke="#0f766e" stroke-width="2" stroke-linecap="round"/>
  <text x="806" y="422" class="box-title">FastAPI Coordinator</text>
  <text x="770" y="455" class="box-copy">REST endpoints and OpenAPI</text>
  <text x="770" y="477" class="box-copy">ThreadPoolExecutor fan-out</text>

  <rect x="1016" y="390" width="150" height="118" class="card"/>
  <circle cx="1048" cy="423" r="18" class="icon"/>
  <path d="M1041 424 h14 M1048 417 v14" stroke="#0f766e" stroke-width="2" stroke-linecap="round"/>
  <text x="1076" y="422" class="box-title">Top-K JSON</text>
  <text x="1040" y="455" class="box-copy">Merged shard scores</text>
  <text x="1040" y="477" class="box-copy">Snippets and signals</text>

  <path d="M284 264 H334" class="line"/>
  <path d="M532 264 H582" class="line"/>
  <path d="M800 264 H850" class="line"/>
  <path d="M953 323 C933 360 700 350 620 388" class="line"/>
  <path d="M686 449 H738" class="line"/>
  <path d="M956 449 H1008" class="line"/>

  <path d="M851 390 C835 356 808 340 768 324" class="soft-line"/>
  <text x="815" y="360" class="box-copy">load index at startup</text>

  <rect x="98" y="594" width="208" height="72" class="card"/>
  <text x="124" y="626" class="metric">25,000 docs</text>
  <text x="124" y="648" class="metric-copy">Reproducible ingestion limit</text>

  <rect x="346" y="594" width="208" height="72" class="card"/>
  <text x="372" y="626" class="metric">4-16 shards</text>
  <text x="372" y="648" class="metric-copy">Configurable local partitioning</text>

  <rect x="594" y="594" width="208" height="72" class="card"/>
  <text x="620" y="626" class="metric">TF-IDF + PageRank</text>
  <text x="620" y="648" class="metric-copy">Hybrid relevance scoring</text>

  <rect x="842" y="594" width="264" height="72" class="card"/>
  <text x="868" y="626" class="metric">Threaded query fan-out</text>
  <text x="868" y="648" class="metric-copy">Sequential vs concurrent benchmark</text>

  <rect x="70" y="32" width="136" height="26" rx="13" fill="url(#accent)"/>
  <text x="91" y="50" class="badge">PORTFOLIO SYSTEM</text>
</svg>
